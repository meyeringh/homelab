# Plugin SAs / RBAC for the ceph-csi-operator-managed CSI drivers.
# These live in rook's deploy/examples/csi-operator.yaml upstream because the
# ceph-csi-operator helm chart deliberately dropped them in v1.0.0 (PR ceph/ceph-csi-operator#321):
# they were moved to a separate ceph-csi-drivers chart that uses a different SA naming
# convention incompatible with rook's Driver CR naming.
# Source: https://github.com/rook/rook/blob/v1.20.0/deploy/examples/csi-operator.yaml
