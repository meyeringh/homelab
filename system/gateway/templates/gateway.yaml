apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https-wildcard
      hostname: "*.meyeringh.org"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-meyeringh-org-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex
      hostname: "meyeringh.org"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-meyeringh-org-tls
      allowedRoutes:
        namespaces:
          from: All
