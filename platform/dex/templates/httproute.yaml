apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dex
  annotations:
    external-dns.alpha.kubernetes.io/target: "homelab-tunnel.meyeringh.org"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: main
      namespace: gateway
      sectionName: https
  hostnames:
    - dex.meyeringh.org
  rules:
    - backendRefs:
        - name: dex
          port: 5556
