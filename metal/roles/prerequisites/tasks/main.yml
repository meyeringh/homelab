- name: Ensure python3-libdnf5 is installed (required by ansible dnf module on Fedora 41+)
  ansible.builtin.command:
    cmd: dnf install -y python3-libdnf5
  register: libdnf5_install
  changed_when: "'Installing' in libdnf5_install.stdout"

- name: Adjust kernel parameters
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - {name: "fs.inotify.max_queued_events", value: 16384}
    - {name: "fs.inotify.max_user_instances", value: 8192}
    - {name: "fs.inotify.max_user_watches", value: 524288}
