apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant-gitops
  namespace: "{{ .Release.Namespace }}"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    name: home-assistant-gitops
  data:
    - secretKey: token
      remoteRef:
        key: home.gitops
        property: token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shelly-sync
data:
  devices.json: {{ .Values.shelly.devices | toJson | quote }}
  shelly_sync.py: |
{{ .Files.Get "files/shelly_sync.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: shelly-sync
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: shelly-sync
          image: python:3.12-alpine
          command: ["python", "/app/shelly_sync.py"]
          env:
            - name: HA_URL
              value: "http://home-home-assistant:8123"
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: home-assistant-gitops
                  key: token
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: shelly-sync
