apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant-gitops
  namespace: "{{ .Release.Namespace }}"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    name: home-assistant-gitops
  data:
    - secretKey: token
      remoteRef:
        key: home.gitops
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant-esphome-keys
  namespace: "{{ .Release.Namespace }}"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    name: home-assistant-esphome-keys
  dataFrom:
    - extract:
        key: home.esphome
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: device-sync
data:
  devices.json: {{ dict "shelly" .Values.shelly.devices "esphome" .Values.esphome.devices | toJson | quote }}
  device_sync.py: |
{{ .Files.Get "files/device_sync.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: device-sync
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: device-sync
          image: python:3.12-alpine
          command: ["python", "/app/device_sync.py"]
          env:
            - name: HA_URL
              value: "http://home-home-assistant:8123"
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: home-assistant-gitops
                  key: token
          volumeMounts:
            - name: script
              mountPath: /app
            - name: esphome-keys
              mountPath: /secrets/esphome
      volumes:
        - name: script
          configMap:
            name: device-sync
        - name: esphome-keys
          secret:
            secretName: home-assistant-esphome-keys
