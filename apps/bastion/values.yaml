app-template:
  controllers:
    bastion:
      pod:
        securityContext:
          fsGroup: 1000
        terminationGracePeriodSeconds: 60
      initContainers:
        fix-permissions:
          image:
            repository: busybox
            tag: 1.37
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /home/meyeringh
      containers:
        app:
          image:
            repository: ghcr.io/meyeringh/bastion
            tag: latest
          command:
            - /usr/bin/tini
            - --
          args:
            - bash
            - -c
            - |
              set -euo pipefail
              sudo mkdir -p /dev/net && sudo mknod /dev/net/tun c 10 200 2>/dev/null || true
              sudo chmod 666 /dev/net/tun
              HOST_KEY_DIR="${SSH_HOST_KEY_DIR:-/etc/ssh/host_keys}"
              SSHD_KEY_DIR="/etc/ssh/host_keys"
              mkdir -p "$HOST_KEY_DIR"
              for type in rsa ecdsa ed25519; do
                key="$HOST_KEY_DIR/ssh_host_${type}_key"
                if [ ! -f "$key" ]; then
                  ssh-keygen -t "$type" -f "$key" -N "" -q
                  echo "Generated $key"
                fi
                chmod 600 "$key"
                ln -sf "$key" "$SSHD_KEY_DIR/ssh_host_${type}_key"
                ln -sf "${key}.pub" "$SSHD_KEY_DIR/ssh_host_${type}_key.pub"
              done
              mkdir -p "$HOME/.ssh" "$HOME/.config/op"
              chmod 700 "$HOME/.ssh" "$HOME/.config/op"
              chmod 600 "$HOME/.config/op"/* 2>/dev/null || true
              exec /usr/sbin/sshd -D -e -f /etc/ssh/sshd_config
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            SSH_HOST_KEY_DIR: /home/meyeringh/.ssh-host-keys
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 2222
                periodSeconds: 10
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 2222
                periodSeconds: 10
            startup:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 2222
                periodSeconds: 10
                failureThreshold: 60
  service:
    bastion:
      controller: bastion
      type: LoadBalancer
      ports:
        ssh:
          port: 2222
          protocol: TCP
  persistence:
    home:
      accessMode: ReadWriteOnce
      size: 100Gi
      retain: true
      globalMounts:
        - path: /home/meyeringh
